<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - FinControl</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline-variant": "#c6c6cd",
                        "tertiary": "#000000",
                        "surface-container-lowest": "#ffffff",
                        "outline": "#76777d",
                        "surface-container-low": "#f6f3f5",
                        "inverse-surface": "#303032",
                        "on-secondary-fixed": "#002113",
                        "inverse-primary": "#bec6e0",
                        "surface-tint": "#565e74",
                        "on-primary-fixed": "#131b2e",
                        "primary-container": "#131b2e",
                        "on-secondary-fixed-variant": "#005236",
                        "on-primary-fixed-variant": "#3f465c",
                        "secondary-fixed": "#6ffbbe",
                        "on-background": "#1b1b1d",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed": "#3d0026",
                        "on-primary": "#ffffff",
                        "background": "#fcf8fa",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed": "#ffd8e7",
                        "on-tertiary-fixed-variant": "#85145a",
                        "on-primary-container": "#7c839b",
                        "error-container": "#ffdad6",
                        "on-error": "#ffffff",
                        "surface-dim": "#dcd9db",
                        "surface-container": "#f0edef",
                        "on-surface": "#1b1b1d",
                        "on-error-container": "#93000a",
                        "secondary": "#006c49",
                        "on-secondary-container": "#00714d",
                        "on-surface-variant": "#45464d",
                        "inverse-on-surface": "#f3f0f2",
                        "tertiary-container": "#3d0026",
                        "surface-variant": "#e4e2e4",
                        "surface-container-high": "#eae7e9",
                        "on-secondary": "#ffffff",
                        "surface-bright": "#fcf8fa",
                        "surface-container-highest": "#e4e2e4",
                        "secondary-container": "#6cf8bb",
                        "tertiary-fixed-dim": "#ffafd3",
                        "primary-fixed": "#dae2fd",
                        "primary-fixed-dim": "#bec6e0",
                        "on-tertiary-container": "#d3579a",
                        "surface": "#fcf8fa",
                        "secondary-fixed-dim": "#4edea3",
                        "primary": "#000000"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "md": "24px",
                        "lg": "40px",
                        "margin": "32px",
                        "xs": "4px",
                        "base": "8px",
                        "xl": "64px",
                        "sm": "12px"
                    },
                    "fontFamily": {
                        "h3": ["Inter"],
                        "h1": ["Inter"],
                        "h2": ["Inter"],
                        "body-lg": ["Inter"],
                        "display": ["Inter"],
                        "body-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "numeric-display": ["Inter"],
                        "label-md": ["Inter"]
                    },
                    "fontSize": {
                        "h3": ["20px", { "lineHeight": "28px", "letterSpacing": "0", "fontWeight": "600" }],
                        "h1": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "h2": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "letterSpacing": "0", "fontWeight": "400" }],
                        "display": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "letterSpacing": "0", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "letterSpacing": "0", "fontWeight": "400" }],
                        "numeric-display": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "500" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
    </style>
    <script src="/js/login.js" defer></script>
</head>
<body class="bg-surface-container-low min-h-screen flex flex-col items-center justify-center font-body-md text-on-background antialiased selection:bg-primary-container selection:text-on-primary-container">
<main class="w-full max-w-[440px] px-md">
<!-- Logo Header -->
<div class="text-center mb-lg">
<h1 class="font-h1 text-h1 text-on-background mb-xs">FinControl</h1>
<p id="formSubtitle" class="font-body-sm text-body-sm text-on-surface-variant">Bienvenido de nuevo</p>
</div>
<!-- Auth Card -->
<div class="bg-surface-container-lowest rounded-xl border border-surface-variant p-margin shadow-sm relative">
    
    <!-- Toast/Error message inside card -->
    <div id="authError" class="hidden absolute top-0 left-0 right-0 bg-error text-on-error py-2 px-4 rounded-t-xl text-center text-body-sm transition-all z-10">
        Credenciales incorrectas
    </div>

<form id="authForm" class="space-y-md" method="POST">
<!-- Username Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-base" for="username">Usuario o Correo</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline">person</span>
<input class="w-full pl-[40px] pr-sm py-sm bg-surface rounded-DEFAULT border-b-2 border-surface-variant border-x-0 border-t-0 focus:border-primary focus:ring-0 font-body-md text-body-md text-on-surface placeholder:text-outline transition-colors outline-none" id="username" name="username" placeholder="admind" required type="text"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex items-center justify-between mb-base">
<label class="block font-label-md text-label-md text-on-surface-variant" for="password">Contraseña</label>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full pl-[40px] pr-sm py-sm bg-surface rounded-DEFAULT border-b-2 border-surface-variant border-x-0 border-t-0 focus:border-primary focus:ring-0 font-body-md text-body-md text-on-surface placeholder:text-outline transition-colors outline-none" id="password" name="password" placeholder="••••••••" required type="password"/>
<button id="togglePasswordBtn" class="absolute right-sm top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button id="submitBtn" class="w-full bg-primary text-on-primary py-sm px-md rounded-DEFAULT font-h3 text-h3 flex justify-center items-center gap-base hover:bg-on-background transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" type="submit">
                    Iniciar Sesión
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>

</form>
<div class="mt-lg text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    <span id="toggleText">¿No tienes una cuenta?</span> 
                    <button id="toggleModeBtn" class="text-primary font-medium hover:underline focus:outline-none rounded-sm" type="button">Regístrate</button>
</p>
</div>
</div>
</main>
</body></html>
